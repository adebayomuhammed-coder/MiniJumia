
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/verify.css') }}">
</head>
<body>

<div class="container">

    <h2>Verify Your Code</h2>
    <p>Enter the 4-digit code sent to your email</p>

    <form method="POST">

        <div class="otp-container">

            <input type="text" name="box1" maxlength="1" class="otp-box" required>
            <input type="text" name="box2" maxlength="1" class="otp-box" required>
            <input type="text" name="box3" maxlength="1" class="otp-box" required>
            <input type="text" name="box4" maxlength="1" class="otp-box" required>

        </div>

        <button type="submit">Verify</button>

    </form>

</div>
<script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
